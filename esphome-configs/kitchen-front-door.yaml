# M5Stack Atom S3 Lite - Kitchen / Front Door Button
# One ESP32, one button. Deployed firmware is named kitchen-front-door
# (entity prefix kitchen_front_door), which ha.py reads as bid
# "kitchen_front_door" — keep this name stable or you break the agent.

esphome:
  name: kitchen-front-door
  friendly_name: "Kitchen/Front Door Button"

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: esp-idf

logger:
  baud_rate: 0

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Kitchen-Front-Door"
    password: !secret ap_password

captive_portal:

# Press counter — incremented on every physical on_press and restored
# across reboots. button-monitor uses sensor.kitchen_front_door_press_count
# to tell a real finger press from the PENDING→IDLE transition a device
# reboot produces when its template switches reset (RESTORE_DEFAULT_OFF):
# a reboot leaves press_count unchanged; a real press advances it.
globals:
  - id: press_counter
    type: int
    restore_value: yes
    initial_value: '0'

sensor:
  - platform: template
    id: press_count
    name: "Press Count"
    icon: mdi:counter
    accuracy_decimals: 0
    unit_of_measurement: "count"
    update_interval: 1s
    lambda: !lambda "return float(id(press_counter));"

# Bluetooth proxy for Home Assistant
esp32_ble_tracker:
  scan_parameters:
    active: true

bluetooth_proxy:
  active: true

light:
  - platform: esp32_rmt_led_strip
    id: led
    name: "LED"
    pin: GPIO35
    num_leds: 4
    chipset: ws2812
    rgb_order: GRB
    effects:
      - pulse:
          name: "Slow Pulse"
          transition_length: 2s
          update_interval: 2s
      - pulse:
          name: "Fast Pulse"
          transition_length: 0.5s
          update_interval: 0.5s
      - strobe:
          name: "Confirm Flash"
          colors:
            - state: true
              brightness: 100%
              red: 0%
              green: 100%
              blue: 0%
              duration: 200ms
            - state: false
              duration: 200ms

binary_sensor:
  - platform: gpio
    id: button
    name: "Button"
    pin:
      number: GPIO41
      inverted: true
      mode:
        input: true
        pullup: true
    filters:
      - delayed_off: 10ms
    on_press:
      then:
        # Advance the restored counter on every press. The press_count
        # template sensor self-publishes this value on its 1s update.
        - globals.set:
            id: press_counter
            value: !lambda "return id(press_counter) + 1;"
        # If any task was assigned (pending or priority), show yellow solid (processing)
        - if:
            condition:
              or:
                - switch.is_on: task_pending
                - switch.is_on: task_priority
            then:
              - light.turn_on:
                  id: led
                  brightness: 100%
                  red: 100%
                  green: 70%
                  blue: 0%
                  effect: none
              - switch.turn_off: task_pending
              - switch.turn_off: task_priority

text_sensor:
  - platform: template
    id: current_task
    name: "Current Task"

switch:
  - platform: template
    id: task_pending
    name: "Task Pending"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    on_turn_on:
      - if:
          condition:
            switch.is_off: task_priority
          then:
            - light.turn_on:
                id: led
                brightness: 50%
                red: 100%
                green: 70%
                blue: 0%
                effect: "Slow Pulse"

  - platform: template
    id: task_priority
    name: "Task Priority"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    on_turn_on:
      - light.turn_on:
          id: led
          brightness: 80%
          red: 100%
          green: 0%
          blue: 0%
          effect: "Fast Pulse"
    on_turn_off:
      - if:
          condition:
            switch.is_on: task_pending
          then:
            - light.turn_on:
                id: led
                brightness: 50%
                red: 100%
                green: 70%
                blue: 0%
                effect: "Slow Pulse"

  - platform: template
    id: task_acknowledged
    name: "Task Acknowledged"
    optimistic: true
    restore_mode: ALWAYS_OFF
    on_turn_on:
      - light.turn_on:
          id: led
          brightness: 100%
          red: 0%
          green: 100%
          blue: 0%
          effect: "Confirm Flash"
      - delay: 2s
      - light.turn_off: led
      - switch.turn_off: task_acknowledged